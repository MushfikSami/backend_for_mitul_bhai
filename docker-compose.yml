version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myappdb
    ports:
      - "5433:5432" # Or 5433:5432 if you changed it earlier
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ---> ADD THIS HEALTHCHECK <---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myappdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/myappdb
    # ---> UPDATE DEPENDS_ON <---
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: